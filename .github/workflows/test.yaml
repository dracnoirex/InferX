name: InferX CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

    - name: Install dependencies
      run: |
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx sqlalchemy alembic aiosqlite

    - name: Start Redis
      uses: supercharge/redis-github-action@1.7.0
      with:
        redis-version: 7

    - name: Create .env file
      run: |
        cp .env.example .env
        echo "SECRET_KEY=test-secret-key-for-ci-only" >> .env
        echo "DEVICE=cpu" >> .env
        echo "ADMIN_USERNAME=admin" >> .env
        echo "ADMIN_PASSWORD=testpassword123" >> .env
        echo "TEST_USERNAME=admin" >> .env
        echo "TEST_PASSWORD=testpassword123" >> .env
        echo "GRAFANA_PASSWORD=testgrafanapassword123" >> .env

    - name: Run tests
      run: |
        python -m pytest tests/ -v